# render.yaml – Bellesence deployment blueprint

services:
  - type: web
    name: bellesence
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bellesence-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: bellesence-db
    plan: free
