{% extends "base.html" %}
{% block content %}
<div class="admin-wrapper">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Products</h2>
        <a href="{{ url_for('add_product') }}" class="btn btn-danger" style="background:#d81b60; border:none;">+ Add Product</a>
    </div>
    <table class="table mt-4">
        <thead>
            <tr><th>Image</th><th>Name</th><th>Price</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for p in products %}
            <tr>
                <td>
                    {% if p.image_filename %}
                    <img src="{{ url_for('static', filename='uploads/' + p.image_filename) }}" height="50">
                    {% endif %}
                </td>
                <td>{{ p.name }}</td>
                <td>${{ "%.2f"|format(p.price) }}</td>
                <td>
                    <a href="{{ url_for('edit_product', id=p.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
                    <a href="{{ url_for('delete_product', id=p.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
