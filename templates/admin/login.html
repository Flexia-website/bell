{% extends "base.html" %}
{% block content %}
<div class="admin-wrapper" style="max-width:400px; margin-top:100px;">
    <h2 class="text-center">Admin Login</h2>
    <form method="POST">
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-danger w-100" style="background:#d81b60; border:none;">Login</button>
    </form>
</div>
{% endblock %}
